<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0D9FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#bg)" />
  <!-- Ticket perforation decoration -->
  <circle cx="0" cy="256" r="40" fill="#09090B" />
  <circle cx="512" cy="256" r="40" fill="#09090B" />
  <line x1="40" y1="256" x2="472" y2="256" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-dasharray="12,10" />
  <!-- S lettermark -->
  <text
    x="256"
    y="330"
    font-family="Arial, Helvetica, sans-serif"
    font-size="290"
    font-weight="900"
    fill="url(#letter)"
    text-anchor="middle"
  >S</text>
</svg>
